<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - NegocioPro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="login.css">

</head>
<body>

    <!-- Navbar simplificada para páginas de auth -->
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold fs-3" href="Admin.html">NegocioPro</a>
        </div>
    </nav>

    <div class="container">
        <div class="login-card card">
            <div class="card-header">
                <h3 class="mb-0 fw-bold">Iniciar Sesión</h3>
            </div>
            <div class="card-body p-4 p-md-5">
                
                <form>
                    <div class="mb-4">
                        <label class="form-label fw-medium">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label fw-medium">Contraseña</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember">
                            <label class="form-check-label" for="remember">Recordarme</label>
                        </div>
                        <a href="#" class="text-primary text-decoration-none">¿Olvidaste tu contraseña?</a>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-login">Ingresar</button>
                </form>
                
                <div class="text-center my-4">
                    <p class="text-muted mb-0">O continúa con</p>
                </div>
                
                <div class="d-flex gap-3">
                    <button class="btn btn-outline-secondary flex-fill social-btn">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button class="btn btn-outline-secondary flex-fill social-btn">
                        <i class="bi bi-facebook"></i> Facebook
                    </button>
                </div>
                
                <div class="text-center mt-5">
                    <p class="mb-0">
                        ¿No tienes cuenta? 
                        <a href="registro.html" class="text-primary fw-semibold text-decoration-none">Regístrate aquí</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
