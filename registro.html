<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - NegocioPro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="registro.css">

</head>
<body>

    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand text-primary fw-bold fs-3" href="Admin.html">NegocioPro</a>
        </div>
    </nav>

    <div class="container">
        <div class="login-card card">
            <div class="card-header">
                <h3 class="mb-0 fw-bold">Crear una cuenta</h3>
                <p class="mb-0 mt-2 opacity-75">Únete a cientos de negocios que ya crecen con nosotros</p>
            </div>
            <div class="card-body p-4 p-md-5">
                
                <form>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Nombre</label>
                            <input type="text" class="form-control" placeholder="Juan" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Apellido</label>
                            <input type="text" class="form-control" placeholder="Pérez" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" placeholder="tu@email.com" required>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Teléfono (opcional)</label>
                        <input type="tel" class="form-control" placeholder="+51 987 654 321">
                    </div>
                    
                    <div class="mb-4">
                        <label class="form-label">Contraseña</label>
                        <input type="password" class="form-control" placeholder="Crea una contraseña segura" required>
                    </div>
                    
                    <div class="form-check mb-4">
                        <input type="checkbox" class="form-check-input" id="terms" required>
                        <label class="form-check-label" for="terms">
                            Acepto los <a href="#" class="text-primary">Términos y Condiciones</a> y la 
                            <a href="#" class="text-primary">Política de Privacidad</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100 btn-register">Crear cuenta</button>
                </form>
                
                <div class="text-center my-4">
                    <p class="text-muted">O regístrate con</p>
                </div>
                
                <div class="d-flex gap-3">
                    <button class="btn btn-outline-secondary flex-fill social-btn">
                        <i class="bi bi-google"></i> Google
                    </button>
                    <button class="btn btn-outline-secondary flex-fill social-btn">
                        <i class="bi bi-facebook"></i> Facebook
                    </button>
                </div>
                
                <div class="text-center mt-5">
                    <p class="mb-0">
                        ¿Ya tienes una cuenta? 
                        <a href="login.html" class="text-primary fw-semibold text-decoration-none">Inicia sesión</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
