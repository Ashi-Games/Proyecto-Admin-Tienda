<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - StoreBuilder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/Css/admin.css}">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white sticky-top">
    <div class="container">
        <a class="navbar-brand text-primary fw-bold fs-3" th:href="@{/}">StoreBuilder</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav mx-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/nosotros}">Nosotros</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/servicios}">Servicios</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/contacto}">Contacto</a></li>
            </ul>
            <div class="d-flex gap-3 align-items-center">
                <div th:if="${usuarioActual != null}">
                    <span class="me-3 text-dark">Hola, <strong th:text="${usuarioActual.nombre}">Usuario</strong></span>
                    <a class="btn btn-outline-danger" th:href="@{/logout}">Cerrar Sesión</a>
                </div>
                <div th:unless="${usuarioActual != null}">
                    <a class="btn btn-outline-primary" th:href="@{/login}">Iniciar sesión</a>
                    <a class="btn btn-primary btn-cta" th:href="@{/register}">Registrarse</a>
                </div>
            </div>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-0">
                <div class="card-body p-5">
                    <h2 class="fw-bold mb-4">Iniciar Sesión</h2>

                    <div th:if="${#fields.hasGlobalErrors()}" class="alert alert-danger" th:errors="*{global}"></div>

                    <form th:action="@{/login}" th:object="${loginForm}" method="post" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Correo electrónico</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="tu@email.com">
                            <div class="text-danger small" th:errors="*{email}"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" th:field="*{password}" placeholder="••••••••">
                            <div class="text-danger small" th:errors="*{password}"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-3">Ingresar</button>
                    </form>

                    <div class="text-center mt-4">
                        <p>¿No tienes cuenta? <a th:href="@{/register}" class="text-primary fw-semibold">Regístrate aquí</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
